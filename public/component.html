<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>匿名コメント</title>
<style>
  /* Componentは決まった大きさの箱として表示されるので、
     動画オーバーレイと違って画面いっぱいに広げてOK */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: rgba(20, 20, 20, 0.9);
    font-family: sans-serif;
    box-sizing: border-box;
  }

  #panel {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 10px;
    box-sizing: border-box;
  }

  textarea {
    flex: 1;
    width: 100%;
    font-size: 14px;
    padding: 8px;
    border-radius: 6px;
    border: none;
    resize: none;
    box-sizing: border-box;
  }

  button {
    margin-top: 8px;
    width: 100%;
    padding: 10px;
    font-size: 14px;
    border-radius: 6px;
    border: none;
    background: #9147ff;
    color: #fff;
    cursor: pointer;
  }

  button:disabled {
    background: #555;
  }

  #status {
    margin-top: 6px;
    font-size: 12px;
    color: #ddd;
    min-height: 16px;
  }
</style>
</head>
<body>

<div id="panel">
  <textarea id="commentInput" maxlength="60" placeholder="匿名でコメント..."></textarea>
  <button id="sendButton" disabled>準備中...</button>
  <div id="status"></div>
</div>

<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
<script>
  const EBS_URL = "";
  let authToken = null;

  const input = document.getElementById("commentInput");
  const button = document.getElementById("sendButton");
  const status = document.getElementById("status");

  window.Twitch.ext.onAuthorized((auth) => {
    authToken = auth.token;
    button.disabled = false;
    button.textContent = "送信";
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!button.disabled) button.click();
    }
  });

  button.addEventListener("click", async () => {
    const text = input.value.trim();
    if (text.length === 0 || !authToken) return;

    button.disabled = true;
    status.textContent = "送信中...";

    try {
      const res = await fetch(`${EBS_URL}/comment`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${authToken}`,
        },
        body: JSON.stringify({ text }),
      });

      const data = await res.json();

      if (res.ok) {
        status.textContent = "送信しました！";
        input.value = "";
      } else {
        status.textContent = data.error || "送信できませんでした";
      }
    } catch (err) {
      status.textContent = "通信エラーが発生しました";
    } finally {
      button.disabled = false;
    }
  });
</script>

</body>
</html>
