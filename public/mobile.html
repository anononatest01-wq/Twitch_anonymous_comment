<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>匿名コメント</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #18181b;
    font-family: sans-serif;
    box-sizing: border-box;
  }

  #panel {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 16px;
    box-sizing: border-box;
  }

  h1 {
    color: #fff;
    font-size: 16px;
    margin: 0 0 12px 0;
  }

  textarea {
    flex: 1;
    width: 100%;
    font-size: 16px; /* スマホでズームされないよう16px以上にする */
    padding: 12px;
    border-radius: 10px;
    border: none;
    resize: none;
    box-sizing: border-box;
  }

  #counter {
    text-align: right;
    color: #aaa;
    font-size: 12px;
    margin-top: 4px;
  }

  button {
    margin-top: 12px;
    width: 100%;
    padding: 16px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background: #9147ff;
    color: #fff;
    cursor: pointer;
  }

  button:disabled {
    background: #555;
  }

  #status {
    margin-top: 10px;
    font-size: 14px;
    color: #ddd;
    min-height: 18px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="panel">
  <h1>匿名でコメントを送る</h1>
  <textarea id="commentInput" maxlength="60" placeholder="ここにコメントを入力..."></textarea>
  <div id="counter">0 / 60</div>
  <button id="sendButton" disabled>準備中...</button>
  <div id="status"></div>
</div>

<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
<script>
  const EBS_URL = "";
  let authToken = null;

  const input = document.getElementById("commentInput");
  const button = document.getElementById("sendButton");
  const status = document.getElementById("status");
  const counter = document.getElementById("counter");

  window.Twitch.ext.onAuthorized((auth) => {
    authToken = auth.token;
    button.disabled = false;
    button.textContent = "送信";
  });

  input.addEventListener("input", () => {
    counter.textContent = `${input.value.length} / 60`;
  });

  // スマホではEnterキーでの送信は基本使わない(改行キーとして扱われるため)ので付けていません

  button.addEventListener("click", async () => {
    const text = input.value.trim();
    if (text.length === 0 || !authToken) return;

    button.disabled = true;
    status.textContent = "送信中...";

    try {
      const res = await fetch(`${EBS_URL}/comment`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${authToken}`,
        },
        body: JSON.stringify({ text }),
      });

      const data = await res.json();

      if (res.ok) {
        status.textContent = "送信しました！";
        input.value = "";
        counter.textContent = "0 / 60";
      } else {
        status.textContent = data.error || "送信できませんでした";
      }
    } catch (err) {
      status.textContent = "通信エラーが発生しました";
    } finally {
      button.disabled = false;
    }
  });
</script>

</body>
</html>
